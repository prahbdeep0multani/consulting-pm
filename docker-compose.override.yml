version: "3.9"

# Developer conveniences — not needed in CI or production.
# Auto-loaded by `docker compose up` when present.

services:
  mailhog:
    image: mailhog/mailhog:latest
    restart: unless-stopped
    networks:
      - consulting-pm
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI

  pgadmin:
    image: dpage/pgadmin4:latest
    restart: unless-stopped
    networks:
      - consulting-pm
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@consulting-pm.local
      PGADMIN_DEFAULT_PASSWORD: admin
    volumes:
      - pgadmin-data:/var/lib/pgadmin

  redis-commander:
    image: rediscommander/redis-commander:latest
    restart: unless-stopped
    networks:
      - consulting-pm
    ports:
      - "8081:8081"
    environment:
      REDIS_HOSTS: local:redis:6379

volumes:
  pgadmin-data:
