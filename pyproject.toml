[tool.ruff]
target-version = "py312"
line-length = 100
src = ["services", "shared"]

[tool.ruff.lint]
select = ["E", "W", "F", "I", "N", "UP", "S", "B", "A", "C4", "T20", "RUF"]
ignore = ["S101", "S104", "B008", "RUF012"]

[tool.ruff.lint.per-file-ignores]
"*/tests/*" = ["S", "T20"]
"*/alembic/*" = ["F401"]

[tool.mypy]
python_version = "3.12"
strict = true
ignore_missing_imports = true
plugins = ["pydantic.mypy", "sqlalchemy.ext.mypy.plugin"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
filterwarnings = ["error"]
