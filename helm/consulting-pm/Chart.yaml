apiVersion: v2
name: consulting-pm
description: Multi-tenant project management platform for consulting companies
type: application
version: 0.1.0
appVersion: "1.0.0"

dependencies:
  - name: postgresql
    alias: postgres-auth
    version: "15.x.x"
    repository: https://charts.bitnami.com/bitnami
    condition: postgres-auth.enabled
  - name: postgresql
    alias: postgres-projects
    version: "15.x.x"
    repository: https://charts.bitnami.com/bitnami
    condition: postgres-projects.enabled
  - name: postgresql
    alias: postgres-timelog
    version: "15.x.x"
    repository: https://charts.bitnami.com/bitnami
    condition: postgres-timelog.enabled
  - name: postgresql
    alias: postgres-billing
    version: "15.x.x"
    repository: https://charts.bitnami.com/bitnami
    condition: postgres-billing.enabled
  - name: postgresql
    alias: postgres-resources
    version: "15.x.x"
    repository: https://charts.bitnami.com/bitnami
    condition: postgres-resources.enabled
  - name: postgresql
    alias: postgres-notifications
    version: "15.x.x"
    repository: https://charts.bitnami.com/bitnami
    condition: postgres-notifications.enabled
  - name: redis
    version: "19.x.x"
    repository: https://charts.bitnami.com/bitnami
    condition: redis.enabled
  - name: minio
    version: "14.x.x"
    repository: https://charts.bitnami.com/bitnami
    condition: minio.enabled
