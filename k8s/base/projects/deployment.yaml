apiVersion: apps/v1
kind: Deployment
metadata:
  name: projects
  labels:
    app: projects
spec:
  replicas: 2
  selector:
    matchLabels:
      app: projects
  template:
    metadata:
      labels:
        app: projects
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: projects
          image: consulting-pm/projects:latest
          ports:
            - containerPort: 8002
          envFrom:
            - configMapRef:
                name: projects-config
            - secretRef:
                name: projects-secret
          resources:
            requests:
              cpu: 150m
              memory: 192Mi
            limits:
              cpu: 750m
              memory: 768Mi
          readinessProbe:
            httpGet:
              path: /ready
              port: 8002
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8002
            initialDelaySeconds: 20
            periodSeconds: 30
