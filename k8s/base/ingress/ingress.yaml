apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: consulting-pm
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - api.consulting-pm.example.com
      secretName: consulting-pm-tls
  rules:
    - host: api.consulting-pm.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: gateway
                port:
                  number: 8000
