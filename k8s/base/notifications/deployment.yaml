apiVersion: apps/v1
kind: Deployment
metadata:
  name: notifications
  labels:
    app: notifications
spec:
  replicas: 2
  selector:
    matchLabels:
      app: notifications
  template:
    metadata:
      labels:
        app: notifications
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: notifications
          image: consulting-pm/notifications:latest
          ports:
            - containerPort: 8006
          envFrom:
            - configMapRef:
                name: notifications-config
            - secretRef:
                name: notifications-secret
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /ready
              port: 8006
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8006
            initialDelaySeconds: 20
            periodSeconds: 30
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: notifications-worker
  labels:
    app: notifications-worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notifications-worker
  template:
    metadata:
      labels:
        app: notifications-worker
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: notifications-worker
          image: consulting-pm/notifications:latest
          command: ["celery", "-A", "app.tasks.celery_app", "worker", "--loglevel=info", "--queues=notifications"]
          envFrom:
            - configMapRef:
                name: notifications-config
            - secretRef:
                name: notifications-secret
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 1Gi
