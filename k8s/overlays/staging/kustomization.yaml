apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: consulting-pm-staging

bases:
  - ../../base

namePrefix: staging-

commonLabels:
  environment: staging

images:
  - name: consulting-pm/gateway
    newTag: staging
  - name: consulting-pm/auth
    newTag: staging
  - name: consulting-pm/projects
    newTag: staging
  - name: consulting-pm/timelog
    newTag: staging
  - name: consulting-pm/billing
    newTag: staging
  - name: consulting-pm/resources
    newTag: staging
  - name: consulting-pm/notifications
    newTag: staging

patches:
  - target:
      kind: Deployment
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 2
  - target:
      kind: HorizontalPodAutoscaler
    patch: |-
      - op: replace
        path: /spec/minReplicas
        value: 2
      - op: replace
        path: /spec/maxReplicas
        value: 5
