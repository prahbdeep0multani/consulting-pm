apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: consulting-pm

bases:
  - ../../base

commonLabels:
  environment: prod

images:
  - name: consulting-pm/gateway
    newTag: "1.0.0"
  - name: consulting-pm/auth
    newTag: "1.0.0"
  - name: consulting-pm/projects
    newTag: "1.0.0"
  - name: consulting-pm/timelog
    newTag: "1.0.0"
  - name: consulting-pm/billing
    newTag: "1.0.0"
  - name: consulting-pm/resources
    newTag: "1.0.0"
  - name: consulting-pm/notifications
    newTag: "1.0.0"

patches:
  - target:
      kind: Deployment
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 3
  - target:
      kind: HorizontalPodAutoscaler
    patch: |-
      - op: replace
        path: /spec/minReplicas
        value: 3
      - op: replace
        path: /spec/maxReplicas
        value: 15
  - target:
      kind: PodDisruptionBudget
    patch: |-
      - op: replace
        path: /spec/minAvailable
        value: 2
